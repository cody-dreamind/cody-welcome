name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            rm -rf node_modules
            npm ci --production=false
            npm run build
            pm2 restart cody-welcome || pm2 start npm --name cody-welcome -- start
            sleep 5
            bash ${{ secrets.DEPLOY_PATH }}/scripts/fix-nginx.sh
