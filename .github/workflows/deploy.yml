name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy and fix nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            npm ci --production=false
            npm run build
            pm2 restart cody-welcome || pm2 start npm --name cody-welcome -- start
            sleep 3

            # Detect actual port Next.js is listening on
            NEXTJS_PORT=$(ss -tlnp 2>/dev/null | grep -E "node|npm" | grep -oP ":(\d+)" | head -1 | tr -d ":")
            if [ -z "$NEXTJS_PORT" ]; then
              NEXTJS_PORT="3000"
            fi
            echo "Next.js port: $NEXTJS_PORT"

            # Find nginx config for this domain
            NGINX_CONF=$(grep -rl "cody.dreamind.cz" /etc/nginx/sites-enabled/ /etc/nginx/sites-available/ /etc/nginx/conf.d/ 2>/dev/null | head -1)

            if [ -n "$NGINX_CONF" ]; then
              echo "Found nginx config: $NGINX_CONF"
              cat "$NGINX_CONF"
              CURRENT_PORT=$(grep -oP "proxy_pass http://localhost:\K[0-9]+" "$NGINX_CONF" | head -1)
              echo "Current proxy port: $CURRENT_PORT, Next.js port: $NEXTJS_PORT"
              if [ -n "$CURRENT_PORT" ] && [ "$CURRENT_PORT" != "$NEXTJS_PORT" ]; then
                echo "Updating nginx port from $CURRENT_PORT to $NEXTJS_PORT"
                sudo sed -i "s|proxy_pass http://localhost:$CURRENT_PORT|proxy_pass http://localhost:$NEXTJS_PORT|g" "$NGINX_CONF"
              fi
            else
              echo "No nginx config found for cody.dreamind.cz, creating one"
              NGINX_CONF="/etc/nginx/sites-available/cody.dreamind.cz"
              cat > /tmp/nginx_cody.conf << NGINXEOF
server {
    listen 80;
    server_name cody.dreamind.cz;

    location / {
        proxy_pass http://localhost:${NEXTJS_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host \$host;
        proxy_cache_bypass \$http_upgrade;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
}
NGINXEOF
              sudo cp /tmp/nginx_cody.conf "$NGINX_CONF"
              sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/
            fi

            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx reloaded"

            # Verify
            sleep 2
            echo "=== Local test ==="
            curl -s http://localhost:${NEXTJS_PORT} | head -5 || echo "Local test failed"
